experiment:
  name: estimator_cumulative_s_dnn
model:
  name: cumulative_s_dnn
  input_representation: cumulative
  sequence:
    construction_mode: segment_mode
  base_learners:
    rnn: {enabled: true}
    gru: {enabled: true}
    lstm: {enabled: true}
    cnn: {enabled: true}
  ensemble:
    cv_folds: 5
runtime:
  shifts: [A_to_B, A_to_C, B_to_A, B_to_C, C_to_A, C_to_B]
  modes: [s_dnn]
  input_representations: [cumulative]
sensor_combinations: [current, vibration, acoustic, current_vibration, current_acoustic, vibration_acoustic, current_vibration_acoustic]
preprocessing:
  segment_settings: [full_length, steady, entry, exit, entry_steady, entry_exit, steady_exit]
seeds:
  seed_list: [0, 1, 2]
estimation:
  phase: full
  runtime_per_atomic_sec:
    cumulative_s_dnn: 600

