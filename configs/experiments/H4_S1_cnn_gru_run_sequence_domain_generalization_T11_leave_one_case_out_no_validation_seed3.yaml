experiment:
  hypothesis_id: H4
  scenario_id: S1
  experiment_topic: cnn_gru_run_sequence_domain_generalization_NASA_Ames_T11_leave_one_case_out_no_validation_seed3
  timestamp: auto
  seed_list:
  - 0
  - 1
  - 2
  num_seeds: 3
  path_schema_version: hierarchical_v1
  execution_dir: auto
  experiment_id: auto
data:
  process_info_path: datasets/processed/mill_process_info_enabled.csv
  signal_data_path: datasets/processed/mill_signal_data_enabled.csv
  target_col: VB
  case_col: case
  run_id_col: run
  run_order_col: run
  sensor_columns:
  - smcAC
  - smcDC
  - vib_spindle
  - vib_table
  - AE_spindle
  - AE_table
  selected_cases:
  - 1
  - 2
  - 8
  - 9
  - 12
  - 14
data_augmentation:
  target_interpolation:
    enabled: true
    method: linear
    fill_first: 0.0
preprocessing:
  drop_first_run:
    enabled: true
  sensor_features:
    smcAC: null
    smcDC: null
    vib_spindle: null
    vib_table: null
    AE_spindle: null
    AE_table: null
domain:
  domain_pairs:
    not_1:
    - 2
    - 8
    - 9
    - 12
    - 14
    case_1:
    - 1
    not_2:
    - 1
    - 8
    - 9
    - 12
    - 14
    case_2:
    - 2
    not_8:
    - 1
    - 2
    - 9
    - 12
    - 14
    case_8:
    - 8
    not_9:
    - 1
    - 2
    - 8
    - 12
    - 14
    case_9:
    - 9
    not_12:
    - 1
    - 2
    - 8
    - 9
    - 14
    case_12:
    - 12
    not_14:
    - 1
    - 2
    - 8
    - 9
    - 12
    case_14:
    - 14
  transfer_scenarios:
  - - not_1
    - case_1
  - - not_2
    - case_2
  - - not_8
    - case_8
  - - not_9
    - case_9
  - - not_12
    - case_12
  - - not_14
    - case_14
split:
  validation_strategy: leave_one_case_out
  validation_ratio: 0.0
  source_only_validation: false
  test_policy: held_out_case
  validation_enabled: false
sequence:
  sequence_size: 3
  stride: 1
  padding: left
  padding_value: 0.0
  allow_cross_case_sequence: false
  segment_setting: full_length
  sequence_length: 256
models:
  feature_ridge:
    enabled: false
  feature_random_forest:
    enabled: false
    n_estimators: 200
    min_samples_leaf: 1
  feature_svr:
    enabled: false
    kernel: rbf
    C: 1.0
    epsilon: 0.1
    gamma: scale
  feature_xgboost:
    enabled: false
    n_estimators: 100
    max_depth: 3
    learning_rate: 0.05
    subsample: 0.9
    colsample_bytree: 0.9
  cnn_only:
    enabled: true
  cnn1d_only:
    enabled: false
  cnn_lag_concat:
    enabled: true
    include_mask: true
  cnn_gru:
    enabled: true
  feature_gru:
    enabled: true
  hybrid_lstm_process:
    enabled: true
dl_model:
  cnn_channels:
  - 16
  - 32
  kernel_size: 5
  latent_dim: 32
  regressor_hidden_dim: 32
  gru_hidden_size: 32
  gru_num_layers: 1
  dropout: 0.0
model_design:
  run_encoder:
    type: windowed_cnn
    input_channels: 6
    window_length: 3000
    num_windows: 5
    stride: auto
    short_run_policy: pad_to_window_length
    window_aggregation: max_pool
    latent_dim: 32
  cnn_encoder:
    channels:
    - 16
    - 32
    kernel_size: 5
    use_batch_norm: true
    activation: relu
    temporal_pooling: global_average_pooling
    dropout: 0.0
  cnn_only:
    enabled: true
    head_hidden_dim: 32
    dropout: 0.0
  cnn1d_only:
    enabled: false
    hidden_dim: 64
    head_hidden_dim: 32
    dropout: 0.0
  cnn_lag_concat:
    enabled: true
    sequence_size: 3
    include_mask: true
    head_hidden_dim: 64
    dropout: 0.0
  cnn_gru:
    enabled: true
    sequence_size: 3
    gru_hidden_size: 32
    gru_num_layers: 1
    bidirectional: false
    dropout: 0.0
    head_hidden_dim: 32
    rnn_type: gru
feature_gru:
  enabled: true
  representation_type: handcrafted_feature_sequence
  feature_scope: full_length
  feature_set: current_framework_default
  feature_dim: auto
  sequence_size: 3
  padding: left
  model:
    input_dim: auto
    gru_hidden_size: 32
    gru_num_layers: 1
    bidirectional: false
    dropout: 0.0
    regression_head_hidden_dim: 32
    output_dim: 1
    rnn_type: gru
  scaler:
    method: standard_scaler
    fit_scope: source_train_only
  imputer:
    method: median
    fit_scope: source_train_only
hybrid_lstm_process:
  enabled: true
  representation_type: resampled_sensor_lstm_plus_process
  input_mode: sensor_plus_process
  use_process_info: true
  numeric_process_columns:
  - DOC
  - feed
  categorical_process_columns:
  - material
  lstm:
    hidden_size: 32
    num_layers: 1
    dropout: 0.0
    bidirectional: false
    temporal_output_mode: last_hidden
  regression_head:
    hidden_dims:
    - 32
    dropout: 0.0
    output_dim: 1
  scaler:
    method: median_standard_scaler_and_one_hot
    fit_scope: source_train_only
normalization:
  method: zscore
  fit_scope: source_train_only
  apply_per_sensor: true
training:
  optimizer: adam
  learning_rate: 0.0005
  batch_size: 8
  max_epochs: 200
  early_stopping:
    enabled: false
    patience: 0
    monitor: none
    mode: min
  checkpoint:
    enabled: true
    save_best: true
    save_last: true
  primary_metric: RMSE
smoke:
  enabled: false
  scenario: A_to_B
  seed: 0
  models:
  - feature_gru
  max_epochs: 2
  batch_size: 4
  sequence_length: 128
  window_length: 300
  num_windows: 5
evaluation:
  metrics:
  - MAE
  - RMSE
  - R2
  aggregate_by_case: true
  aggregate_by_target_domain: true
visualization:
  rmse_filter_enabled: true
  rmse_filter_threshold: 0.5
  rmse_filter_metric: RMSE
  rmse_filter_operator: '>'
  rmse_filter_level: case_model_seed
  exclude_filtered_from_metrics: false
  exclude_filtered_from_ranking: false
  exclude_filtered_from_report_tables: false
